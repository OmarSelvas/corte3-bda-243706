
services:
  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinica_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB:       clinica_vet
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema_corte3.sql:/docker-entrypoint-initdb.d/00_schema.sql
      - ./backend/01_procedures.sql:/docker-entrypoint-initdb.d/01_procedures.sql
      - ./backend/02_triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql
      - ./backend/03_views.sql:/docker-entrypoint-initdb.d/03_views.sql
      - ./backend/04_roles_y_permisos.sql:/docker-entrypoint-initdb.d/04_roles.sql
      - ./backend/05_rls.sql:/docker-entrypoint-initdb.d/05_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinica_vet"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clinica_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # API Express
  # ─────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clinica_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_HOST:        postgres
      PG_PORT:        5432
      PG_DB:          clinica_vet
      PG_VET_USER:    vet_user
      PG_VET_PASS:    vet_dev_2026
      PG_RECEP_USER:  recepcion_user
      PG_RECEP_PASS:  recepcion_dev_2026
      PG_ADMIN_USER:  admin_user
      PG_ADMIN_PASS:  admin_dev_2026
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      CACHE_TTL:      300
      PORT:           4000
      FRONTEND_URL:   http://localhost:3000
    ports:
      - "4000:4000"

  # ─────────────────────────────────────────
  # Frontend Next.js
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinica_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  pg_data: